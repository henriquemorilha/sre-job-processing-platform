apiVersion: v1
kind: Service
metadata:
  name: sre-api-service
spec:
  type: NodePort
  selector:
    app: sre-api
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 32507

---
apiVersion: v1
kind: Service
metadata:
  name: sre-redis
spec:
  type: ClusterIP
  selector:
    app: sre-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379