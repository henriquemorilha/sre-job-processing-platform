apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-redis
  labels:
    app: sre-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-redis
  template:
    metadata:
      labels:
        app: sre-redis
    spec:
      containers:
      - name: redis
        image: redis:latest
        ports:
        - containerPort: 6379