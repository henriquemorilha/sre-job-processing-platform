apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-worker
  namespace: sre
  labels:
    app: sre-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: sre-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: sre-worker
          image: henriquemorilha/sre-worker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
