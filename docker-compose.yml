services:
  redis:
    image: redislabs/rebloom:latest
    container_name: sre_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sre_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: sre_worker
    command: python worker.py
    volumes:
      - ./worker:/app
    depends_on:
      - redis