name: Generate Jobs

on:
  schedule:
    - cron: "*/5 * * * *"  # roda a cada 5 minutos
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Simulate multiple jobs
        run: |
          for i in {1..10}; do
            curl -X POST https://sre-job-processing-platform.onrender.com/job \
            -H "Content-Type: application/json" \
            -d "{\"payload\":\"auto-job-$i-$(uuidgen)\"}"
          done
